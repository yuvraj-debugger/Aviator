version: '3.8'

services:
  app:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql://root:password@db:3306/aviator
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretaviatorkey
    depends_on:
      - db
      - redis

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=aviator
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  mysql_data:
